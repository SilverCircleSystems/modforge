                <td style={{ padding: "3px 6px", borderBottom: "1px solid #1a1a1a", textAlign: "right", color: "#2ecc71" }}>${p.totalCost.toFixed(2)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ marginTop: 12, color: "#555", fontSize: 9, lineHeight: 1.5 }}>
        * Costs are approximate. Source from Tayda Electronics, Mouser, or Thonk for best prices.
        Panel, knobs, standoffs, and PCB fabrication costs not included.
        Power header assumes standard Eurorack 10-pin (±12V).
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function EurorackPrototyper() {
  const [modules, setModules] = useState([]);
  const [connections, setConnections] = useState([]);
  const [activePort, setActivePort] = useState(null);
  const [drawingWire, setDrawingWire] = useState(null); // { moduleId, type, port, x, y, startX, startY }
  const [view, setView] = useState("patch"); // "patch" | "bom" | "schematic"
  const [audioStarted, setAudioStarted] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const [zoom, setZoom] = useState(1); // 0.5 to 2
  const engineRef = useRef(null);
  const nextId = useRef(1);
  const patchAreaRef = useRef(null);
  const [lineCoords, setLineCoords] = useState([]);

  const [outputParams, setOutputParams] = useState({ volume: 0.3 });
  const outputModule = { id: "output", type: "OUTPUT", params: outputParams };

  // Custom modules created from Design tab
  const [customModuleDefs, setCustomModuleDefs] = useState(() => {
    try { return JSON.parse(localStorage.getItem("modforge_custom_modules") || "{}"); } catch { return {}; }
  });

  const onSendToPatch = useCallback((design) => {
    const typeKey = "CUSTOM_" + design.name.toUpperCase().replace(/[^A-Z0-9]/g, "_");
    const newDef = {
      color: design.color,
      icon: design.icon,
      params: design.params,
      inputs: design.inputs,
      outputs: design.outputs,
      _custom: true,
      _blockNames: design.blockNames,
      _components: design.components,
      _hpWidth: design.hpWidth,
      _currentDraw: design.currentDraw,
    };
    setCustomModuleDefs(prev => {
      const next = { ...prev, [typeKey]: newDef };
      try { localStorage.setItem("modforge_custom_modules", JSON.stringify(next)); } catch {}
      return next;
    });
    // Auto-add an instance to the rack
    const id = `mod_${nextId.current++}`;
    const params = {};
    newDef.params.forEach(p => { params[p.name] = p.default; });
    setModules(prev => [...prev, { id, type: typeKey, params }]);
    if (engineRef.current && engineRef.current.isRunning) {
      engineRef.current.createModuleNode(id, typeKey, params);
    }
    setView("patch");
  }, []);

  useEffect(() => {
    engineRef.current = new AudioEngine();
    window.__audioEngine = engineRef.current;
    return () => {
      if (engineRef.current) engineRef.current.dispose();
    };
  }, []);

  // ─── ZOOM KEYBOARD SHORTCUTS ──────────────────────────────────────────────
  useEffect(() => {
    const handleKeyZoom = (e) => {
      if ((e.ctrlKey || e.metaKey) && (e.key === "=" || e.key === "+")) {
        e.preventDefault();
        setZoom(z => Math.min(2, +(z + 0.1).toFixed(1)));
      } else if ((e.ctrlKey || e.metaKey) && e.key === "-") {
        e.preventDefault();
        setZoom(z => Math.max(0.5, +(z - 0.1).toFixed(1)));
      } else if ((e.ctrlKey || e.metaKey) && e.key === "0") {
        e.preventDefault();
        setZoom(1);
      }
    };
    const handleWheelZoom = (e) => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        setZoom(z => {
          const delta = e.deltaY > 0 ? -0.05 : 0.05;
          return Math.min(2, Math.max(0.5, +(z + delta).toFixed(2)));
        });
      }
    };
    window.addEventListener("keydown", handleKeyZoom);
    window.addEventListener("wheel", handleWheelZoom, { passive: false });
    return () => {
      window.removeEventListener("keydown", handleKeyZoom);
      window.removeEventListener("wheel", handleWheelZoom);
    };
  }, []);

  const startAudio = () => {
    if (!engineRef.current) return;
    engineRef.current.init();
    // Ensure AudioContext is running (browser may block without user gesture)
    if (engineRef.current.ctx && engineRef.current.ctx.state === "suspended") {
      engineRef.current.ctx.resume();
    }
    // Recreate all module nodes
    modules.forEach(m => {
      engineRef.current.createModuleNode(m.id, m.type, m.params);
    });
    engineRef.current.createModuleNode("output", "OUTPUT", outputModule.params);
    // Reconnect
    connections.forEach(c => {
      engineRef.current.connect(c.fromId, c.fromPort, c.toId, c.toPort);
    });
    setAudioStarted(true);
  };

  const stopAudio = () => {
    if (!engineRef.current) return;
    engineRef.current.stop();
    // Reinitialize a fresh engine so we can start again later
    engineRef.current = new AudioEngine();
    window.__audioEngine = engineRef.current;
    setAudioStarted(false);
  };

  const getModuleDef = useCallback((type) => {
    return MODULE_DEFS[type] || customModuleDefs[type] || null;
  }, [customModuleDefs]);

  const addModule = (type) => {
    const def = getModuleDef(type);
    if (!def) return;
    const params = {};
    def.params.forEach(p => { params[p.name] = p.default; });
    if (type === "SEQ") {
      params.stepData = [1,1,1,1,1,1,1,1];
      params.pitchData = [0,2,4,5,7,9,11,12];
    }
    const id = `mod_${nextId.current++}`;
    const newMod = { id, type, params };
    setModules(prev => [...prev, newMod]);
    if (engineRef.current && engineRef.current.isRunning) {
      engineRef.current.createModuleNode(id, type, params);
    }
  };

  const removeModule = (id) => {
    setConnections(prev => prev.filter(c => c.fromId !== id && c.toId !== id));
    if (drawingWire && drawingWire.moduleId === id) {
      setDrawingWire(null);
      drawingWireRef.current = null;
      setActivePort(null);
    }
    if (engineRef.current) {
      connections.filter(c => c.fromId === id || c.toId === id).forEach(c => {
        engineRef.current.disconnect(c.fromId, c.toId, c.toPort, c.fromPort);
      });
      engineRef.current.removeModuleNode(id);
    }
    setModules(prev => prev.filter(m => m.id !== id));
  };

  const onParamChange = (moduleId, paramName, value) => {
    if (moduleId === "output") {
      setOutputParams(prev => ({ ...prev, [paramName]: value }));
    } else {
      setModules(prev => prev.map(m =>
        m.id === moduleId ? { ...m, params: { ...m.params, [paramName]: value } } : m
      ));
    }
    if (engineRef.current) {
      engineRef.current.updateParam(moduleId, paramName, value);
    }
  };

  const onPortClick = (moduleId, type, port, e) => {
    // First click: start drawing a wire from this port
    if (!drawingWire) {
      const rect = patchAreaRef.current?.getBoundingClientRect();
      const portEl = document.getElementById(`port-${moduleId}-${type}-${port.replace(/\s/g, "_")}`);
      let startX = 0, startY = 0;
      if (rect && portEl) {
        const pRect = portEl.getBoundingClientRect();
        startX = (pRect.left + pRect.width / 2 - rect.left) / zoom;
        startY = (pRect.top + pRect.height / 2 - rect.top) / zoom;
      }
      const wire = { moduleId, type, port, x: startX, y: startY, startX, startY };
      setDrawingWire(wire);
      drawingWireRef.current = wire;
      setActivePort({ moduleId, type, port });
      return;
    }

    // Second click: complete the connection
    if (drawingWire.type === type) {
      // Clicked same type - restart from this port
      const rect = patchAreaRef.current?.getBoundingClientRect();
      const portEl = document.getElementById(`port-${moduleId}-${type}-${port.replace(/\s/g, "_")}`);
      let startX = 0, startY = 0;
      if (rect && portEl) {
        const pRect = portEl.getBoundingClientRect();
        startX = (pRect.left + pRect.width / 2 - rect.left) / zoom;
        startY = (pRect.top + pRect.height / 2 - rect.top) / zoom;
      }
      const wire = { moduleId, type, port, x: startX, y: startY, startX, startY };
      setDrawingWire(wire);
      drawingWireRef.current = wire;
      setActivePort({ moduleId, type, port });
      return;
    }

    const fromId = type === "output" ? moduleId : drawingWire.moduleId;
    const fromPort = type === "output" ? port : drawingWire.port;
    const toId = type === "input" ? moduleId : drawingWire.moduleId;
    const toPort = type === "input" ? port : drawingWire.port;

    // Check if connection already exists — toggle remove
    const exists = connections.some(c => c.fromId === fromId && c.fromPort === fromPort && c.toId === toId && c.toPort === toPort);
    if (exists) {
      setConnections(prev => prev.filter(c => !(c.fromId === fromId && c.fromPort === fromPort && c.toId === toId && c.toPort === toPort)));
      if (engineRef.current) engineRef.current.disconnect(fromId, toId, toPort, fromPort);
    } else {
      const newConn = { fromId, fromPort, toId, toPort };
      setConnections(prev => [...prev, newConn]);
      if (engineRef.current && engineRef.current.isRunning) {
        engineRef.current.connect(fromId, fromPort, toId, toPort);
      }
    }
    setDrawingWire(null);
    drawingWireRef.current = null;
    setActivePort(null);
  };

  // ─── DRAG & DROP REORDER ──────────────────────────────────────────────────
  const handleDragStart = (idx) => {
    setDragIdx(idx);
  };

  const handleDragOver = (e, idx) => {
    e.preventDefault();
    if (dragIdx === null || dragIdx === idx) return;
    setDragOverIdx(idx);
  };

  const handleDrop = (e, idx) => {
    e.preventDefault();
    if (dragIdx === null || dragIdx === idx) {
      setDragIdx(null);
      setDragOverIdx(null);
      return;
    }
    setModules(prev => {
      const next = [...prev];
      const [dragged] = next.splice(dragIdx, 1);
      next.splice(idx, 0, dragged);
      return next;
    });
    setDragIdx(null);
    setDragOverIdx(null);
  };

  const handleDragEnd = () => {
    setDragIdx(null);
    setDragOverIdx(null);
  };

  // ─── CABLE VISUAL STATE ─────────────────────────────────────────────────────
  // Cables are purely visual — managed via connection list panel.
  // No midpoint dragging or endpoint drag-off (prevents knob/control conflicts).
  const drawingWireRef = useRef(null);

  // ─── DRAWING WIRE MOUSE TRACKING ──────────────────────────────────────────
  const cancelDrawingWire = useCallback(() => {
    setDrawingWire(null);
    drawingWireRef.current = null;
    setActivePort(null);
  }, []);

  // Escape cancels drawing wire
  useEffect(() => {
    const handleEsc = (e) => { if (e.key === "Escape") cancelDrawingWire(); };
    window.addEventListener("keydown", handleEsc);
    return () => window.removeEventListener("keydown", handleEsc);
  }, [cancelDrawingWire]);

  // Window-level mousemove for drawing wire cursor tracking
  useEffect(() => {
    const handleMouseMove = (e) => {
      if (!drawingWireRef.current) return;
      const rect = patchAreaRef.current?.getBoundingClientRect();
      if (!rect) return;
      const x = (e.clientX - rect.left) / zoom;
      const y = (e.clientY - rect.top) / zoom;
      const updated = { ...drawingWireRef.current, x, y };
      drawingWireRef.current = updated;
      setDrawingWire(updated);
    };

    window.addEventListener("mousemove", handleMouseMove);
    return () => window.removeEventListener("mousemove", handleMouseMove);
  }, [zoom]);

  // ─── RIGHT-CLICK ON PORT → NEW WIRE ──────────────────────────────────────
  const onPortRightClick = (e, moduleId, type, port) => {
    e.preventDefault();
    const rect = patchAreaRef.current?.getBoundingClientRect();
    const portEl = document.getElementById(`port-${moduleId}-${type}-${port.replace(/\s/g, "_")}`);
    let startX = 0, startY = 0;
    if (rect && portEl) {
      const pRect = portEl.getBoundingClientRect();
      startX = (pRect.left + pRect.width / 2 - rect.left) / zoom;
      startY = (pRect.top + pRect.height / 2 - rect.top) / zoom;
    }
    const wire = { moduleId, type, port, x: startX, y: startY, startX, startY };
    setDrawingWire(wire);
    drawingWireRef.current = wire;
    setActivePort({ moduleId, type, port });
  };

  // ─── DOUBLE-CLICK ON PORT → RELEASE CABLE & REDRAW FROM OTHER END ─────
  const onPortDoubleClick = (moduleId, type, port) => {
    // Find connections attached to this port
    const attached = connections.filter(c =>
      (type === "input" && c.toId === moduleId && c.toPort === port) ||
      (type === "output" && c.fromId === moduleId && c.fromPort === port)
    );
    if (attached.length === 0) return;

    // Take the most recent connection on this port
    const conn = attached[attached.length - 1];

    // Disconnect it from audio engine
    if (engineRef.current) {
      engineRef.current.disconnect(conn.fromId, conn.toId, conn.toPort, conn.fromPort);
    }

    // Remove from connections list
    setConnections(prev => prev.filter(c =>
      !(c.fromId === conn.fromId && c.fromPort === conn.fromPort && c.toId === conn.toId && c.toPort === conn.toPort)
    ));

    // Start drawing a new wire from the OTHER end (the end that wasn't double-clicked)
    const otherModuleId = type === "input" ? conn.fromId : conn.toId;
    const otherPort = type === "input" ? conn.fromPort : conn.toPort;
    const otherType = type === "input" ? "output" : "input";
    const portEl = document.getElementById(`port-${otherModuleId}-${otherType}-${otherPort.replace(/\s/g, "_")}`);
    const rect = patchAreaRef.current?.getBoundingClientRect();
    let startX = 0, startY = 0;
    if (rect && portEl) {
      const pRect = portEl.getBoundingClientRect();
      startX = (pRect.left + pRect.width / 2 - rect.left) / zoom;
      startY = (pRect.top + pRect.height / 2 - rect.top) / zoom;
    }
    const wire = { moduleId: otherModuleId, type: otherType, port: otherPort, x: startX, y: startY, startX, startY };
    setDrawingWire(wire);
    drawingWireRef.current = wire;
    setActivePort({ moduleId: otherModuleId, type: otherType, port: otherPort });
  };

  // ─── REMOVE SINGLE CONNECTION ──────────────────────────────────────────────
  const removeConnection = (idx) => {
    const conn = connections[idx];
    if (conn && engineRef.current) {
      engineRef.current.disconnect(conn.fromId, conn.toId, conn.toPort, conn.fromPort);
    }
    setConnections(prev => prev.filter((_, i) => i !== idx));
  };

  // ─── CLEAR ALL CONNECTIONS ────────────────────────────────────────────────
  const clearAllConnections = () => {
    connections.forEach(c => {
      if (engineRef.current) engineRef.current.disconnect(c.fromId, c.toId, c.toPort, c.fromPort);
    });
    setConnections([]);
  };

  const allModules = [...modules, { ...outputModule }];

  // ─── PATCH CABLE SVG OVERLAY ─────────────────────────────────────────────

  const updateLines = useCallback(() => {
    const container = patchAreaRef.current;
    if (!container || connections.length === 0) { setLineCoords([]); return; }
    const rect = container.getBoundingClientRect();
    const newLines = connections.map((c) => {
      const fromEl = document.getElementById(`port-${c.fromId}-output-${c.fromPort.replace(/\s/g, "_")}`);
      const toEl = document.getElementById(`port-${c.toId}-input-${c.toPort.replace(/\s/g, "_")}`);
      if (!fromEl || !toEl) return null;
      const fRect = fromEl.getBoundingClientRect();
      const tRect = toEl.getBoundingClientRect();
      const fromMod = allModules.find(m => m.id === c.fromId);
      const fromDef = fromMod?.type === "OUTPUT" ? OUTPUT_MODULE : getModuleDef(fromMod?.type);
      return {
        x1: (fRect.left + fRect.width / 2 - rect.left) / zoom,
        y1: (fRect.top + fRect.height / 2 - rect.top) / zoom,
        x2: (tRect.left + tRect.width / 2 - rect.left) / zoom,
        y2: (tRect.top + tRect.height / 2 - rect.top) / zoom,
        color: fromDef?.color || "#888",
      };
    }).filter(Boolean);
    setLineCoords(newLines);
  }, [connections, modules, zoom, customModuleDefs]);

  useEffect(() => {
    updateLines();
    // Update on resize / scroll
    window.addEventListener("resize", updateLines);
    const interval = setInterval(updateLines, 300);
    return () => { window.removeEventListener("resize", updateLines); clearInterval(interval); };
  }, [updateLines]);

  return (
    <div style={{
      minHeight: "100vh",
      background: "#0a0a0a",
      color: "#e0e0e0",
      fontFamily: "'JetBrains Mono', 'Fira Code', 'Courier New', monospace",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{
        borderBottom: "1px solid #1a1a1a",
        padding: "12px 20px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        background: "linear-gradient(180deg, #111 0%, #0a0a0a 100%)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{
            fontSize: 20, fontWeight: 700, letterSpacing: 3,
            background: "linear-gradient(135deg, #e74c3c, #f39c12, #2ecc71, #3498db, #9b59b6)",
            WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
          }}>
            MODFORGE
          </div>
          <span style={{ fontSize: 9, color: "#444", letterSpacing: 1 }}>EURORACK PROTOTYPER</span>
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          {["patch", "design", "bom", "schematic"].map(v => (
            <button
              key={v}
              onClick={() => setView(v)}
              style={{
                background: view === v ? "#fff" : "transparent",
                color: view === v ? "#000" : "#666",
                border: `1px solid ${view === v ? "#fff" : "#333"}`,
                borderRadius: 3, padding: "5px 14px",
                fontSize: 10, fontWeight: 700, letterSpacing: 1,
                cursor: "pointer", fontFamily: "'JetBrains Mono', monospace",
                textTransform: "uppercase",
              }}
            >{v === "patch" ? "⚡ PATCH" : v === "bom" ? "📋 BOM" : v === "schematic" ? "⎔ SCHEMATIC" : "🔧 DESIGN"}</button>
          ))}
          {/* Zoom controls */}
          <div style={{
            display: "flex", alignItems: "center", gap: 4,
            marginLeft: 12, padding: "0 4px",
            borderLeft: "1px solid #222",
          }}>
            <button
              onClick={() => setZoom(z => Math.max(0.5, +(z - 0.1).toFixed(1)))}
              style={{
                background: "transparent", border: "1px solid #333", borderRadius: 3,
                color: "#888", width: 24, height: 24, cursor: "pointer",
                fontFamily: "'JetBrains Mono', monospace", fontSize: 13, fontWeight: 700,
                display: "flex", alignItems: "center", justifyContent: "center",
                lineHeight: 1,
              }}
              onMouseEnter={e => { e.target.style.borderColor = "#666"; e.target.style.color = "#fff"; }}
              onMouseLeave={e => { e.target.style.borderColor = "#333"; e.target.style.color = "#888"; }}
              title="Zoom out"
            >−</button>
            <div
              onClick={() => setZoom(1)}
              style={{
                fontSize: 9, color: zoom === 1 ? "#555" : "#aaa", letterSpacing: 1,
                minWidth: 38, textAlign: "center", cursor: "pointer",
                fontFamily: "'JetBrains Mono', monospace",
              }}
              title="Reset zoom to 100%"
            >{Math.round(zoom * 100)}%</div>
            <button
              onClick={() => setZoom(z => Math.min(2, +(z + 0.1).toFixed(1)))}
              style={{
                background: "transparent", border: "1px solid #333", borderRadius: 3,
                color: "#888", width: 24, height: 24, cursor: "pointer",
                fontFamily: "'JetBrains Mono', monospace", fontSize: 13, fontWeight: 700,
                display: "flex", alignItems: "center", justifyContent: "center",
                lineHeight: 1,
              }}
              onMouseEnter={e => { e.target.style.borderColor = "#666"; e.target.style.color = "#fff"; }}
              onMouseLeave={e => { e.target.style.borderColor = "#333"; e.target.style.color = "#888"; }}
              title="Zoom in"
            >+</button>
          </div>
        </div>
      </div>

      {/* Zoom container */}
      <div style={{
        transform: `scale(${zoom})`,
        transformOrigin: "top left",
        width: `${100 / zoom}%`,
        minHeight: `${100 / zoom}vh`,
        transition: "transform 0.15s ease",
      }}>
      {view === "patch" ? (
        <div style={{ padding: 16 }}>
          {/* Module Palette */}
          <div style={{
            display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap",
            padding: "10px 0",
            borderBottom: "1px solid #1a1a1a",
          }}>
            <span style={{ fontSize: 9, color: "#444", letterSpacing: 1, alignSelf: "center", marginRight: 8 }}>ADD →</span>
            {Object.entries(MODULE_DEFS).map(([type, def]) => (
              <button
                key={type}
                onClick={() => addModule(type)}
                style={{
                  background: "#111",
                  color: def.color,
                  border: `1px solid ${def.color}44`,
                  borderRadius: 4,
                  padding: "5px 10px",
                  fontSize: 9,
                  fontWeight: 700,
                  letterSpacing: 1,
                  cursor: "pointer",
                  fontFamily: "'JetBrains Mono', monospace",
                  transition: "all 0.15s",
                }}
                onMouseEnter={(e) => { e.target.style.background = def.color + "22"; e.target.style.borderColor = def.color; }}
                onMouseLeave={(e) => { e.target.style.background = "#111"; e.target.style.borderColor = def.color + "44"; }}
              >
                {def.icon} {type}
              </button>
            ))}
            {/* Custom modules from Design tab */}
            {Object.keys(customModuleDefs).length > 0 && (
              <>
                <div style={{ width: 1, height: 24, background: "#333", alignSelf: "center", margin: "0 4px" }} />
                <span style={{ fontSize: 8, color: "#9b59b6", letterSpacing: 1, alignSelf: "center" }}>CUSTOM →</span>
                {Object.entries(customModuleDefs).map(([type, def]) => (
                  <button
                    key={type}
                    onClick={() => addModule(type)}
                    onContextMenu={(e) => {
                      e.preventDefault();
                      if (confirm(`Delete custom module "${type.replace("CUSTOM_", "").replace(/_/g, " ")}"?`)) {
                        setCustomModuleDefs(prev => {
                          const next = { ...prev }; delete next[type];
                          try { localStorage.setItem("modforge_custom_modules", JSON.stringify(next)); } catch {}
                          return next;
                        });
                      }
                    }}
                    style={{
                      background: "#111",
                      color: def.color,
                      border: `1px solid ${def.color}44`,
                      borderRadius: 4,
                      padding: "5px 10px",
                      fontSize: 9,
                      fontWeight: 700,
                      letterSpacing: 1,
                      cursor: "pointer",
                      fontFamily: "'JetBrains Mono', monospace",
                      transition: "all 0.15s",
                    }}
                    onMouseEnter={(e) => { e.target.style.background = def.color + "22"; e.target.style.borderColor = def.color; }}
                    onMouseLeave={(e) => { e.target.style.background = "#111"; e.target.style.borderColor = def.color + "44"; }}
                    title="Click to add • Right-click to delete"
                  >
                    {def.icon} {type.replace("CUSTOM_", "")}
                  </button>
                ))}
              </>
            )}
          </div>

          {/* Audio Control & Waveform */}
          <div style={{ display: "flex", gap: 8, marginBottom: 16, alignItems: "center" }}>
            {!audioStarted ? (
              <button
                onClick={startAudio}
                style={{
                  background: "#2ecc71",
                  color: "#000",
                  border: `1px solid #2ecc71`,
                  borderRadius: 4, padding: "8px 20px",
                  fontSize: 11, fontWeight: 700, letterSpacing: 1,
                  cursor: "pointer", fontFamily: "'JetBrains Mono', monospace",
                }}
              >▶ START AUDIO</button>
            ) : (
              <button
                onClick={stopAudio}
                style={{
                  background: "#e74c3c",
                  color: "#fff",
                  border: `1px solid #e74c3c`,
                  borderRadius: 4, padding: "8px 20px",
                  fontSize: 11, fontWeight: 700, letterSpacing: 1,
                  cursor: "pointer", fontFamily: "'JetBrains Mono', monospace",
                  animation: "pulse-border 1.5s ease-in-out infinite",
                }}
              >■ STOP AUDIO</button>
            )}
            {audioStarted && (
              <span style={{ fontSize: 9, color: "#2ecc71", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1 }}>
                ● RUNNING
              </span>
            )}
            <div style={{ flex: 1 }}>
              <Waveform engine={engineRef.current} />
            </div>
          </div>

          {/* ─── Persistent Status Bar ─── */}
          <div style={{
            background: drawingWire ? "#1a1a1a" : "#111",
            border: `1px solid ${drawingWire ? "#f39c12" : "#222"}`,
            borderRadius: 4,
            padding: "6px 12px",
            marginBottom: 12,
            fontSize: 10,
            color: drawingWire ? "#f39c12" : "#555",
            display: "flex", alignItems: "center", gap: 8,
            minHeight: 34,
            transition: "all 0.15s ease",
            fontFamily: "'JetBrains Mono', monospace",
          }}>
            {drawingWire ? (
              <>
                <span style={{ fontSize: 14 }}>⚡</span>
                <span>
                  Drawing wire from <strong style={{ color: "#fff" }}>{(() => { const m = allModules.find(mod => mod.id === drawingWire.moduleId); return m ? (m.type.startsWith("CUSTOM_") ? m.type.replace("CUSTOM_","") : m.type) : drawingWire.moduleId; })()}</strong>:{drawingWire.port}
                  — click a {drawingWire.type === "output" ? "input" : "output"} port to connect
                </span>
                <button onClick={cancelDrawingWire} style={{
                  marginLeft: "auto", background: "none", border: "1px solid #f39c12",
                  color: "#f39c12", borderRadius: 3, padding: "2px 8px", cursor: "pointer",
                  fontSize: 9, fontFamily: "'JetBrains Mono', monospace",
                }}>ESC</button>
              </>
            ) : (
              <>
                <span style={{ color: "#444" }}>
                  <span style={{ color: "#666" }}>Click</span> port to patch
                  {connections.length > 0 && <> · <span style={{ color: "#666" }}>Double-click</span> port to release &amp; re-patch</>}
                  {" "}· <span style={{ color: "#666" }}>Right-click</span> port to add wire
                </span>
                {connections.length > 0 && (
                  <span style={{ marginLeft: "auto", color: "#333", fontSize: 9 }}>
                    {connections.length} cable{connections.length !== 1 ? "s" : ""}
                  </span>
                )}
              </>
            )}
          </div>

          {/* Active Connections */}
          {connections.length > 0 && (
            <div style={{ marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 9, color: "#444", letterSpacing: 1, marginBottom: 6 }}>PATCH CABLES</div>
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                  {connections.map((c, i) => {
                    const fromMod = allModules.find(m => m.id === c.fromId);
                    const toMod = allModules.find(m => m.id === c.toId);
                    const fromDef = fromMod?.type === "OUTPUT" ? OUTPUT_MODULE : getModuleDef(fromMod?.type);
                    const col = fromDef?.color || "#888";
                    return (
                      <div key={i} style={{
                        background: "#111",
                        border: `1px solid ${col}33`,
                        borderRadius: 3,
                        padding: "3px 6px 3px 8px",
                        fontSize: 9,
                        color: col,
                        display: "flex", alignItems: "center", gap: 5,
                        transition: "all 0.1s",
                      }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = col; e.currentTarget.style.background = col + "11"; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = col + "33"; e.currentTarget.style.background = "#111"; }}
                      >
                        <span style={{ fontSize: 8 }}>
                          {fromMod?.type?.startsWith("CUSTOM_") ? fromMod.type.replace("CUSTOM_", "") : fromMod?.type}:{c.fromPort} → {toMod?.type?.startsWith("CUSTOM_") ? toMod.type.replace("CUSTOM_", "") : toMod?.type}:{c.toPort}
                        </span>
                        <button
                          onClick={() => removeConnection(i)}
                          style={{
                            background: "none", border: "none", color: "#555",
                            cursor: "pointer", fontSize: 11, padding: "0 1px",
                            lineHeight: 1, fontFamily: "'JetBrains Mono', monospace",
                          }}
                          onMouseEnter={e => e.currentTarget.style.color = "#e74c3c"}
                          onMouseLeave={e => e.currentTarget.style.color = "#555"}
                          title="Remove this connection"
                        >×</button>
                      </div>
                    );
                  })}
                </div>
              </div>
              <button
                onClick={clearAllConnections}
                style={{
                  background: "transparent",
                  color: "#e74c3c",
                  border: "1px solid #e74c3c44",
                  borderRadius: 3, padding: "5px 12px",
                  fontSize: 9, fontWeight: 700, letterSpacing: 1,
                  cursor: "pointer", fontFamily: "'JetBrains Mono', monospace",
                  whiteSpace: "nowrap",
                  transition: "all 0.15s",
                }}
                onMouseEnter={e => { e.target.style.background = "#e74c3c22"; e.target.style.borderColor = "#e74c3c"; }}
                onMouseLeave={e => { e.target.style.background = "transparent"; e.target.style.borderColor = "#e74c3c44"; }}
                title="Remove all patch cables"
              >✕ CLEAR ALL</button>
            </div>
          )}

          {/* Modules Grid with patch cable overlay */}
          <div
            ref={patchAreaRef}
            style={{ position: "relative", cursor: drawingWire ? "crosshair" : undefined }}
            onClick={(e) => {
              // Click on empty space cancels drawing wire
              if (drawingWire && !e.target.closest('[data-port]')) cancelDrawingWire();
            }}
          >
            {/* SVG Connection Lines — purely visual, no pointer events */}
            {(lineCoords.length > 0 || drawingWire) && (
              <svg style={{
                position: "absolute", top: 0, left: 0,
                width: "100%", height: "100%",
                pointerEvents: "none",
                zIndex: 10,
                overflow: "visible",
              }}>
                <defs>
                  {lineCoords.map((line, i) => (
                    <linearGradient key={`grad-${i}`} id={`cable-grad-${i}`} x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%" stopColor={line.color} stopOpacity="0.7" />
                      <stop offset="50%" stopColor={line.color} stopOpacity="0.4" />
                      <stop offset="100%" stopColor={line.color} stopOpacity="0.7" />
                    </linearGradient>
                  ))}
                  {drawingWire && (() => {
                    const mod = allModules.find(m => m.id === drawingWire.moduleId);
                    const def = mod?.type === "OUTPUT" ? OUTPUT_MODULE : getModuleDef(mod?.type);
                    const col = def?.color || "#f39c12";
                    return (
                      <linearGradient id="cable-grad-drawing" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stopColor={col} stopOpacity="0.8" />
                        <stop offset="50%" stopColor={col} stopOpacity="0.4" />
                        <stop offset="100%" stopColor={col} stopOpacity="0.8" />
                      </linearGradient>
                    );
                  })()}
                </defs>
                {/* Established connections — visual only */}
                {lineCoords.map((line, i) => {
                  const x1 = line.x1, y1 = line.y1, x2 = line.x2, y2 = line.y2;
                  const baseMidX = (x1 + x2) / 2;
                  const baseMidY = (x1 === x2 && y1 === y2) ? y1 + 40 : Math.max(y1, y2);
                  const dist = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
                  const sag = Math.min(dist * 0.3, 60);
                  const ctrlX = baseMidX;
                  const ctrlY = baseMidY + sag;

                  return (
                    <g key={i}>
                      {/* Shadow */}
                      <path d={`M ${x1} ${y1} Q ${ctrlX} ${ctrlY + 2}, ${x2} ${y2}`}
                        fill="none" stroke="rgba(0,0,0,0.3)" strokeWidth="3" strokeLinecap="round" />
                      {/* Main cable */}
                      <path d={`M ${x1} ${y1} Q ${ctrlX} ${ctrlY}, ${x2} ${y2}`}
                        fill="none" stroke={`url(#cable-grad-${i})`} strokeWidth="2" strokeLinecap="round" />
                      {/* Glow */}
                      <path d={`M ${x1} ${y1} Q ${ctrlX} ${ctrlY}, ${x2} ${y2}`}
                        fill="none" stroke={line.color} strokeWidth="0.8" strokeLinecap="round" opacity="0.3" />
                      {/* Endpoints */}
                      <circle cx={x1} cy={y1} r="4" fill={line.color} opacity="0.8" />
                      <circle cx={x2} cy={y2} r="4" fill={line.color} opacity="0.8" />
                    </g>
                  );
                })}
                {/* Drawing wire (animated cable following cursor) */}
                {drawingWire && (() => {
                  const mod = allModules.find(m => m.id === drawingWire.moduleId);
                  const def = mod?.type === "OUTPUT" ? OUTPUT_MODULE : getModuleDef(mod?.type);
                  const col = def?.color || "#f39c12";
                  const sx = drawingWire.startX, sy = drawingWire.startY;
                  const ex = drawingWire.x, ey = drawingWire.y;
                  const midX = (sx + ex) / 2;
                  const d = Math.sqrt((ex - sx) ** 2 + (ey - sy) ** 2);
                  const sag = Math.min(d * 0.3, 60);
                  const midY = Math.max(sy, ey) + sag;
                  return (
                    <g opacity="0.85">
                      <path d={`M ${sx} ${sy} Q ${midX} ${midY + 2}, ${ex} ${ey}`}
                        fill="none" stroke="rgba(0,0,0,0.25)" strokeWidth="3" strokeLinecap="round" />
                      <path d={`M ${sx} ${sy} Q ${midX} ${midY}, ${ex} ${ey}`}
                        fill="none" stroke="url(#cable-grad-drawing)" strokeWidth="2" strokeLinecap="round"
                        strokeDasharray="6 3" />
                      <path d={`M ${sx} ${sy} Q ${midX} ${midY}, ${ex} ${ey}`}
                        fill="none" stroke={col} strokeWidth="0.8" strokeLinecap="round" opacity="0.4" />
                      <circle cx={sx} cy={sy} r="4" fill={col} opacity="0.9" />
                      <circle cx={ex} cy={ey} r="6" fill="none" stroke={col} strokeWidth="1.5" opacity="0.6">
                        <animate attributeName="r" values="5;8;5" dur="1s" repeatCount="indefinite" />
                        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1s" repeatCount="indefinite" />
                      </circle>
                      <circle cx={ex} cy={ey} r="2.5" fill={col} opacity="0.7" />
                    </g>
                  );
                })()}
              </svg>
            )}

            <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "flex-start" }}>
              {modules.map((m, idx) => (
                <div
                  key={m.id}
                  draggable
                  onDragStart={() => handleDragStart(idx)}
                  onDragOver={(e) => handleDragOver(e, idx)}
                  onDrop={(e) => handleDrop(e, idx)}
                  onDragEnd={handleDragEnd}
                  style={{
                    opacity: dragIdx === idx ? 0.4 : 1,
                    transition: "opacity 0.15s, transform 0.15s",
                    transform: dragOverIdx === idx ? "scale(1.03)" : "scale(1)",
                    outline: dragOverIdx === idx ? `2px dashed ${getModuleDef(m.type)?.color || "#888"}` : "none",
                    outlineOffset: 3,
                    borderRadius: 8,
                    cursor: "grab",
                    position: "relative",
                  }}
                >
                  {/* Drag handle indicator */}
                  <div style={{
                    position: "absolute", top: 3, left: "50%", transform: "translateX(-50%)",
                    display: "flex", gap: 2, zIndex: 20, pointerEvents: "none",
                    opacity: 0.3,
                  }}>
                    <span style={{ fontSize: 7, color: "#666", letterSpacing: 2, fontFamily: "'JetBrains Mono', monospace" }}>⠿</span>
                  </div>
                  <ModulePanel
                    module={m}
                    def={getModuleDef(m.type)}
                    onParamChange={onParamChange}
                    onRemove={removeModule}
                    onPortClick={onPortClick}
                    onPortDoubleClick={onPortDoubleClick}
                    onPortRightClick={onPortRightClick}
                    activePort={activePort}
                    connections={connections}
                    engine={engineRef.current}
                  />
                </div>
              ))}
              {/* Output Module - always visible, not draggable */}
              <ModulePanel
                module={outputModule}
                def={OUTPUT_MODULE}
                onParamChange={onParamChange}
                onRemove={() => {}}
                onPortClick={onPortClick}
                onPortDoubleClick={onPortDoubleClick}
                onPortRightClick={onPortRightClick}
                activePort={activePort}
                connections={connections}
                isOutput
                engine={engineRef.current}
              />
            </div>
          </div>

          {modules.length === 0 && (
            <div style={{
              textAlign: "center", padding: "40px 20px", color: "#333",
            }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>◊</div>
              <div style={{ fontSize: 12, letterSpacing: 2 }}>ADD MODULES TO START PATCHING</div>
              <div style={{ fontSize: 10, color: "#333", marginTop: 8, lineHeight: 1.8 }}>
                Click module buttons above → connect ports by clicking output then input → start audio to hear it<br/>
                Click a port to start a wire, then click a compatible port to connect • Double-click a connected port to release and re-patch • Right-click to add another wire
              </div>
            </div>
          )}
        </div>
      ) : view === "bom" ? (
        <div style={{ padding: 16, maxWidth: 900 }}>
          <BOMView modules={allModules} />
        </div>
      ) : view === "schematic" ? (
        <div style={{ padding: 16 }}>
          <SchematicView modules={allModules} />
        </div>
      ) : (
        <div style={{ padding: 16 }}>
          <DesignView onSendToPatch={onSendToPatch} />
        </div>
      )}
      </div>{/* end zoom container */}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(EurorackPrototyper));
</script>
</body>
</html>
