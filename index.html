// ─── AUDIO ENGINE ────────────────────────────────────────────────────────────
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.nodes = {};
    this.masterGain = null;
    this.analyser = null;
    this.isRunning = false;
  }

  init() {
    if (this.ctx) {
      // If context exists but is suspended, resume it
      if (this.ctx.state === "suspended") this.ctx.resume();
      return;
    }
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Explicitly resume — required by browsers after user gesture
    if (this.ctx.state === "suspended") this.ctx.resume();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.3;
    this.analyser = this.ctx.createAnalyser();
    this.analyser.fftSize = 2048;
    this.masterGain.connect(this.analyser);
    this.analyser.connect(this.ctx.destination);
    this.isRunning = true;
  }

  createModuleNode(moduleId, type, params) {
    if (!this.ctx) this.init();
    this.removeModuleNode(moduleId);

    const node = { type, connections: {} };

    switch (type) {
      case "VCO": {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        gain.gain.value = 1;
        const wf = params.waveform || "sawtooth";
        osc.type = wf === "saw" ? "sawtooth" : wf;
        osc.frequency.value = params.frequency || 440;
        osc.detune.value = params.detune || 0;
        osc.connect(gain);
        osc.start();
        node.osc = osc;
        node.output = gain;
        node.fmGain = this.ctx.createGain();
        node.fmGain.gain.value = 200;
        node.fmGain.connect(osc.frequency);
        break;
      }
      case "VCF": {
        const filter = this.ctx.createBiquadFilter();
        filter.type = params.type || "lowpass";
        filter.frequency.value = params.cutoff || 1000;
        filter.Q.value = params.resonance || 1;
        node.filter = filter;
        node.input = filter;
        node.output = filter;
        break;
      }
      case "VCA": {
        const gain = this.ctx.createGain();
        gain.gain.value = params.gain ?? 0.8;
        node.gain = gain;
        node.input = gain;
        node.output = gain;
        break;
      }
      case "ADSR": {
        // ADSR outputs a constant source modulated by scheduled gain changes
        const constSrc = this.ctx.createConstantSource();
        const envGain = this.ctx.createGain();
        envGain.gain.value = 0;
        constSrc.offset.value = 1;
        constSrc.connect(envGain);
        constSrc.start();
        node.constSrc = constSrc;
        node.envGain = envGain;
        node.output = envGain;
        node.params = { ...params };
        break;
      }
      case "LFO": {
        const lfo = this.ctx.createOscillator();
        const lfoGain = this.ctx.createGain();
        const wf2 = params.waveform || "sine";
        lfo.type = wf2 === "saw" ? "sawtooth" : wf2;
        lfo.frequency.value = params.rate || 2;
        lfoGain.gain.value = (params.depth || 0.5) * 500; // scale for frequency mod
        lfo.connect(lfoGain);
        lfo.start();
        node.lfo = lfo;
        node.lfoGain = lfoGain;
        node.output = lfoGain;
        break;
      }
      case "MIXER": {
        const merger = this.ctx.createGain();
        merger.gain.value = 1;
        const ch1 = this.ctx.createGain(); ch1.gain.value = params.ch1 ?? 0.7;
        const ch2 = this.ctx.createGain(); ch2.gain.value = params.ch2 ?? 0.7;
        const ch3 = this.ctx.createGain(); ch3.gain.value = params.ch3 ?? 0;
        const ch4 = this.ctx.createGain(); ch4.gain.value = params.ch4 ?? 0;
        ch1.connect(merger); ch2.connect(merger); ch3.connect(merger); ch4.connect(merger);
        node.channels = [ch1, ch2, ch3, ch4];
        node.output = merger;
        break;
      }
      case "NOISE": {
        const bufferSize = 2 * this.ctx.sampleRate;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        // White noise
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noiseSrc = this.ctx.createBufferSource();
        noiseSrc.buffer = buffer;
        noiseSrc.loop = true;
        const noiseGain = this.ctx.createGain();
        noiseGain.gain.value = params.level ?? 0.5;
        if (params.type === "pink") {
          const pinkFilter = this.ctx.createBiquadFilter();
          pinkFilter.type = "lowpass";
          pinkFilter.frequency.value = 1000;
          noiseSrc.connect(pinkFilter);
          pinkFilter.connect(noiseGain);
          node.pinkFilter = pinkFilter;
        } else {
          noiseSrc.connect(noiseGain);
        }
        noiseSrc.start();
        node.noiseSrc = noiseSrc;
        node.noiseGain = noiseGain;
        node.output = noiseGain;
        break;
      }
      case "SAMPLE & HOLD": {
        // Simplified S&H using a gain node that steps
        const shGain = this.ctx.createGain();
        shGain.gain.value = 1;
        node.input = shGain;
        node.output = shGain;
        break;
      }
      case "STEREO": {
        // Stereo panner with width control
        // Mono input → panned to L/R outputs
        const inputGain = this.ctx.createGain();
        inputGain.gain.value = params.level ?? 0.8;
        const panner = this.ctx.createStereoPanner();
        panner.pan.value = params.pan ?? 0;
        const splitter = this.ctx.createChannelSplitter(2);
        const merger = this.ctx.createChannelMerger(2);
        const leftGain = this.ctx.createGain();
        const rightGain = this.ctx.createGain();
        leftGain.gain.value = 1;
        rightGain.gain.value = 1;
        // Also accept separate L/R inputs
        const leftIn = this.ctx.createGain();
        leftIn.gain.value = 1;
        const rightIn = this.ctx.createGain();
        rightIn.gain.value = 1;
        // Mono path: input → panner → splitter → L/R gains → merger
        inputGain.connect(panner);
        panner.connect(splitter);
        splitter.connect(leftGain, 0);
        splitter.connect(rightGain, 1);
        // Stereo input paths merge into outputs
        leftIn.connect(leftGain);
        rightIn.connect(rightGain);
        leftGain.connect(merger, 0, 0);
        rightGain.connect(merger, 0, 1);
        // Output is the merger, but we also provide individual L/R outputs
        const leftOut = this.ctx.createGain();
        const rightOut = this.ctx.createGain();
        leftOut.gain.value = 1;
        rightOut.gain.value = 1;
        leftGain.connect(leftOut);
        rightGain.connect(rightOut);
        node.inputGain = inputGain;
        node.panner = panner;
        node.leftIn = leftIn;
        node.rightIn = rightIn;
        node.leftOut = leftOut;
        node.rightOut = rightOut;
        node.input = inputGain; // default for mono
        node.output = leftOut; // default output is L
        node.outputR = rightOut;
        break;
      }
      case "SEQ": {
        // Sequencer: outputs gate (constant source toggled), trigger (short pulse), and CV
        const gateGain = this.ctx.createGain();
        gateGain.gain.value = 0;
        const gateSrc = this.ctx.createConstantSource();
        gateSrc.offset.value = 1;
        gateSrc.connect(gateGain);
        gateSrc.start();
        const trigGain = this.ctx.createGain();
        trigGain.gain.value = 0;
        const trigSrc = this.ctx.createConstantSource();
        trigSrc.offset.value = 1;
        trigSrc.connect(trigGain);
        trigSrc.start();
        const cvGain = this.ctx.createGain();
        cvGain.gain.value = 1;
        const cvSrc = this.ctx.createConstantSource();
        cvSrc.offset.value = 0;
        cvSrc.connect(cvGain);
        cvSrc.start();
        node.gateGain = gateGain;
        node.gateSrc = gateSrc;
        node.trigGain = trigGain;
        node.trigSrc = trigSrc;
        node.cvGain = cvGain;
        node.cvSrc = cvSrc;
        node.output = gateGain; // default output is gate
        node.outputTrig = trigGain;
        node.outputCV = cvGain;
        node.params = { ...params };
        node.stepData = params.stepData || [1,1,1,1,1,1,1,1];
        node.pitchData = params.pitchData || [0,0,0,0,0,0,0,0];
        node.currentStep = 0;
        node.playing = false;
        // Start internal clock
        const bpm = params.bpm || 120;
        const stepTime = 60 / bpm;
        const gateLen = (params.gateLength || 0.5) * stepTime;
        node._seqInterval = setInterval(() => {
          if (!this.ctx || this.ctx.state !== "running") return;
          const numSteps = node.params.steps || 8;
          node.currentStep = (node.currentStep + 1) % numSteps;
          const active = node.stepData[node.currentStep];
          const pitch = node.pitchData[node.currentStep] || 0;
          const now = this.ctx.currentTime;
          const curStepTime = 60 / (node.params.bpm || 120);
          const curGateLen = (node.params.gateLength || 0.5) * curStepTime;
          // CV output: pitch in semitones → frequency offset in Hz
          // Base freq 440Hz (A4), each semitone = freq * 2^(1/12) - freq
          // We output absolute frequency offset so VCO can add it
          const baseFreq = 440;
          const targetFreq = baseFreq * Math.pow(2, pitch / 12);
          const freqOffset = targetFreq - baseFreq;
          node.cvSrc.offset.setValueAtTime(freqOffset, now);
          if (active) {
            // Gate on
            node.gateGain.gain.setValueAtTime(1, now);
            node.gateGain.gain.setValueAtTime(0, now + curGateLen);
            // Trigger: short 10ms pulse
            node.trigGain.gain.setValueAtTime(1, now);
            node.trigGain.gain.setValueAtTime(0, now + 0.01);
          } else {
            node.gateGain.gain.setValueAtTime(0, now);
          }
          // Notify UI
          if (node._onStep) node._onStep(node.currentStep);
        }, stepTime * 1000);
        break;
      }
      case "OUTPUT": {
        const outGain = this.ctx.createGain();
        outGain.gain.value = params.volume ?? 0.3;
        outGain.connect(this.masterGain);
        node.input = outGain;
        node.outGain = outGain;
        break;
      }
      case "TUNER": {
        // Tuner: pass-through with analyser for pitch detection
        const tunerIn = this.ctx.createGain();
        tunerIn.gain.value = 1;
        const tunerOut = this.ctx.createGain();
        tunerOut.gain.value = 1;
        const tunerAnalyser = this.ctx.createAnalyser();
        tunerAnalyser.fftSize = 4096;
        tunerIn.connect(tunerAnalyser);
        tunerIn.connect(tunerOut);
        node.input = tunerIn;
        node.output = tunerOut;
        node.tunerAnalyser = tunerAnalyser;
        node.params = { refPitch: params.refPitch || 440 };
        // Pitch detection via autocorrelation
        node._tunerBuf = new Float32Array(tunerAnalyser.fftSize);
        node._detectedPitch = 0;
        node._detectedNote = "";
        node._detectedCents = 0;
        node._tunerInterval = setInterval(() => {
          if (!this.ctx || this.ctx.state !== "running") return;
          tunerAnalyser.getFloatTimeDomainData(node._tunerBuf);
          const buf = node._tunerBuf;
          const n = buf.length;
          // Check if there's enough signal
          let rms = 0;
          for (let i = 0; i < n; i++) rms += buf[i] * buf[i];
          rms = Math.sqrt(rms / n);
          if (rms < 0.01) { node._detectedPitch = 0; node._detectedNote = "—"; node._detectedCents = 0; return; }
          // Autocorrelation
          const corr = new Float32Array(n);
          for (let lag = 0; lag < n; lag++) {
            let sum = 0;
            for (let i = 0; i < n - lag; i++) sum += buf[i] * buf[i + lag];
            corr[lag] = sum;
          }
          // Find first dip then first peak
          let dip = 0;
          for (let i = 1; i < n; i++) { if (corr[i] < corr[i - 1]) { dip = i; break; } }
          let bestLag = dip, bestVal = -1;
          for (let i = dip; i < n; i++) {
            if (corr[i] > bestVal) { bestVal = corr[i]; bestLag = i; }
            if (corr[i] < 0 && bestVal > 0) break;
          }
          if (bestLag > 0 && bestVal > 0) {
            const freq = this.ctx.sampleRate / bestLag;
            if (freq > 20 && freq < 5000) {
              node._detectedPitch = freq;
              const ref = node.params.refPitch || 440;
              const noteNum = 12 * Math.log2(freq / ref) + 69;
              const roundedNote = Math.round(noteNum);
              const cents = Math.round((noteNum - roundedNote) * 100);
              const noteNames = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
              const name = noteNames[((roundedNote % 12) + 12) % 12];
              const octave = Math.floor(roundedNote / 12) - 1;
              node._detectedNote = `${name}${octave}`;
              node._detectedCents = cents;
            }
          }
          if (node._onTunerUpdate) node._onTunerUpdate(node._detectedNote, node._detectedPitch, node._detectedCents);
        }, 50);
        break;
      }
      case "CLOCK": {
        // Master clock: outputs clock, /2, /4, and reset pulses
        const clockGain = this.ctx.createGain();
        clockGain.gain.value = 0;
        const clockSrc = this.ctx.createConstantSource();
        clockSrc.offset.value = 1;
        clockSrc.connect(clockGain);
        clockSrc.start();
        const div2Gain = this.ctx.createGain();
        div2Gain.gain.value = 0;
        const div2Src = this.ctx.createConstantSource();
        div2Src.offset.value = 1;
        div2Src.connect(div2Gain);
        div2Src.start();
        const div4Gain = this.ctx.createGain();
        div4Gain.gain.value = 0;
        const div4Src = this.ctx.createConstantSource();
        div4Src.offset.value = 1;
        div4Src.connect(div4Gain);
        div4Src.start();
        const resetGain = this.ctx.createGain();
        resetGain.gain.value = 0;
        const resetSrc = this.ctx.createConstantSource();
        resetSrc.offset.value = 1;
        resetSrc.connect(resetGain);
        resetSrc.start();
        node.clockGain = clockGain;
        node.clockSrc = clockSrc;
        node.div2Gain = div2Gain;
        node.div2Src = div2Src;
        node.div4Gain = div4Gain;
        node.div4Src = div4Src;
        node.resetGain = resetGain;
        node.resetSrc = resetSrc;
        node.output = clockGain; // default: clock
        node.outputDiv2 = div2Gain;
        node.outputDiv4 = div4Gain;
        node.outputReset = resetGain;
        node.params = { ...params };
        node._clockBeat = 0;
        node._clockLed = false;
        const bpm = params.bpm || 120;
        const stepTime = 60000 / bpm;
        node._clockInterval = setInterval(() => {
          if (!this.ctx || this.ctx.state !== "running") return;
          const now = this.ctx.currentTime;
          const curBpm = node.params.bpm || 120;
          const curPW = node.params.pulseWidth || 0.5;
          const curStep = 60 / curBpm;
          const pw = curPW * curStep;
          // Clock pulse
          node.clockGain.gain.setValueAtTime(1, now);
          node.clockGain.gain.setValueAtTime(0, now + pw);
          // Divisions
          if (node._clockBeat % 2 === 0) {
            node.div2Gain.gain.setValueAtTime(1, now);
            node.div2Gain.gain.setValueAtTime(0, now + pw);
          }
          if (node._clockBeat % 4 === 0) {
            node.div4Gain.gain.setValueAtTime(1, now);
            node.div4Gain.gain.setValueAtTime(0, now + pw);
          }
          node._clockLed = !node._clockLed;
          if (node._onClockTick) node._onClockTick(node._clockBeat, node._clockLed);
          node._clockBeat++;
        }, stepTime);
        break;
      }
      case "MULT": {
        // Buffered multiple: 1 input → 4 isolated outputs via gain nodes
        const inputGain = this.ctx.createGain();
        inputGain.gain.value = params.gain || 1;
        node.input = inputGain;
        // Create 4 output buffers
        node.outA = this.ctx.createGain(); node.outA.gain.value = 1;
        node.outB = this.ctx.createGain(); node.outB.gain.value = 1;
        node.outC = this.ctx.createGain(); node.outC.gain.value = 1;
        node.outD = this.ctx.createGain(); node.outD.gain.value = 1;
        inputGain.connect(node.outA);
        inputGain.connect(node.outB);
        inputGain.connect(node.outC);
        inputGain.connect(node.outD);
        node.output = node.outA; // Default output is A
        break;
      }
      default: {
        // CUSTOM modules from Design tab — type starts with CUSTOM_
        if (type.startsWith("CUSTOM_")) {
          // Look up block composition from the window-stored custom defs
          const customDefs = (() => { try { return JSON.parse(localStorage.getItem("modforge_custom_modules") || "{}"); } catch { return {}; } })();
          const cDef = customDefs[type];
          const blockNames = cDef?._blockNames || [];
          const hasOsc = blockNames.some(n => /CEM|VCO|Triangle|Wavefold|Oscillat/i.test(n));
          const hasFilter = blockNames.some(n => /Filter|Ladder|SVF|LP|HP|Sallen/i.test(n));
          const hasAmp = blockNames.some(n => /VCA|Amplif|Gain/i.test(n));
          const hasEnv = blockNames.some(n => /ADSR|Envelope|AR/i.test(n));
          const hasMod = blockNames.some(n => /LFO|Modula|S&H|Sample/i.test(n));
          const hasNoise = blockNames.some(n => /Noise/i.test(n));

          if (hasOsc) {
            const osc = this.ctx.createOscillator();
            osc.type = "sawtooth";
            osc.frequency.value = params.frequency || 440;
            osc.start();
            node.osc = osc;
            node.fmGain = this.ctx.createGain();
            node.fmGain.gain.value = 200;
            node.fmGain.connect(osc.frequency);
          }
          if (hasNoise) {
            const buf = this.ctx.createBuffer(1, 2 * this.ctx.sampleRate, this.ctx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
            const ns = this.ctx.createBufferSource();
            ns.buffer = buf; ns.loop = true; ns.start();
            node.noiseSrc = ns;
          }
          if (hasFilter) {
            const filt = this.ctx.createBiquadFilter();
            filt.type = "lowpass";
            filt.frequency.value = params.cutoff || 2000;
            filt.Q.value = params.resonance || 2;
            node.filter = filt;
          }
          const outGain = this.ctx.createGain();
          outGain.gain.value = hasAmp ? (params.level || 0.8) : 1;
          node.outGain = outGain;

          // Wire chain
          let last = null;
          if (node.osc) last = node.osc;
          if (node.noiseSrc && !last) last = node.noiseSrc;
          else if (node.noiseSrc && last) {
            const mix = this.ctx.createGain(); mix.gain.value = 0.3;
            node.noiseSrc.connect(mix); mix.connect(outGain);
          }
          if (node.filter) {
            if (last) last.connect(node.filter);
            last = node.filter;
            node.input = node.filter;
          }
          if (last) last.connect(outGain);
          else node.input = outGain;
          if (!node.input) node.input = outGain;
          node.output = outGain;

          if (hasMod) {
            const lfo = this.ctx.createOscillator();
            lfo.type = "triangle"; lfo.frequency.value = params.lfoRate || 3;
            const lg = this.ctx.createGain();
            lg.gain.value = (params.lfoDepth || 0.3) * 500;
            lfo.connect(lg);
            if (node.filter) lg.connect(node.filter.frequency);
            else if (node.osc) lg.connect(node.osc.frequency);
            lfo.start(); node.lfo = lfo; node.lfoGain = lg;
          }
          if (hasEnv) {
            const cs = this.ctx.createConstantSource();
            const eg = this.ctx.createGain(); eg.gain.value = 0;
            cs.offset.value = 1; cs.connect(eg); cs.start();
            node.constSrc = cs; node.envGain = eg;
            eg.connect(outGain.gain);
          }
        } else {
          const g = this.ctx.createGain(); g.gain.value = 1;
          node.input = g; node.output = g;
        }
        break;
      }
    }

    this.nodes[moduleId] = node;
    return node;
  }

  updateParam(moduleId, paramName, value) {
    const node = this.nodes[moduleId];
    if (!node) return;

    switch (node.type) {
      case "VCO":
        if (paramName === "frequency" && node.osc) node.osc.frequency.value = value;
        if (paramName === "detune" && node.osc) node.osc.detune.value = value;
        if (paramName === "waveform" && node.osc) node.osc.type = value === "saw" ? "sawtooth" : value;
        break;
      case "VCF":
        if (paramName === "cutoff" && node.filter) node.filter.frequency.value = value;
        if (paramName === "resonance" && node.filter) node.filter.Q.value = value;
        if (paramName === "type" && node.filter) node.filter.type = value;
        break;
      case "VCA":
        if (paramName === "gain" && node.gain) node.gain.gain.value = value;
        break;
      case "LFO":
        if (paramName === "rate" && node.lfo) node.lfo.frequency.value = value;
        if (paramName === "depth" && node.lfoGain) node.lfoGain.gain.value = value * 500;
        if (paramName === "waveform" && node.lfo) node.lfo.type = value === "saw" ? "sawtooth" : value;
        break;
      case "MIXER":
        if (paramName.startsWith("ch") && node.channels) {
          const idx = parseInt(paramName.replace("ch", "")) - 1;
          if (node.channels[idx]) node.channels[idx].gain.value = value;
        }
        break;
      case "NOISE":
        if (paramName === "level" && node.noiseGain) node.noiseGain.gain.value = value;
        break;
      case "OUTPUT":
        if (paramName === "volume" && node.outGain) node.outGain.gain.value = value;
        break;
      case "ADSR":
        if (node.params) node.params[paramName] = value;
        break;
      case "STEREO":
        if (paramName === "pan" && node.panner) node.panner.pan.value = value;
        if (paramName === "level" && node.inputGain) node.inputGain.gain.value = value;
        break;
      case "SEQ":
        if (node.params) {
          node.params[paramName] = value;
          // If BPM changed, restart the interval
          if (paramName === "bpm" && node._seqInterval) {
            clearInterval(node._seqInterval);
            const stepTime = 60 / value;
            node._seqInterval = setInterval(() => {
              if (!this.ctx || this.ctx.state !== "running") return;
              const numSteps = node.params.steps || 8;
              node.currentStep = (node.currentStep + 1) % numSteps;
              const active = node.stepData[node.currentStep];
              const pitch = node.pitchData[node.currentStep] || 0;
              const now = this.ctx.currentTime;
              const curStepTime = 60 / (node.params.bpm || 120);
              const curGateLen = (node.params.gateLength || 0.5) * curStepTime;
              node.cvSrc.offset.setValueAtTime(440 * Math.pow(2, pitch / 12) - 440, now);
              if (active) {
                node.gateGain.gain.setValueAtTime(1, now);
                node.gateGain.gain.setValueAtTime(0, now + curGateLen);
                node.trigGain.gain.setValueAtTime(1, now);
                node.trigGain.gain.setValueAtTime(0, now + 0.01);
              } else {
                node.gateGain.gain.setValueAtTime(0, now);
              }
              if (node._onStep) node._onStep(node.currentStep);
            }, stepTime * 1000);
          }
        }
        break;
      case "TUNER":
        if (node.params) node.params[paramName] = value;
        break;
      case "CLOCK":
        if (node.params) {
          node.params[paramName] = value;
          if (paramName === "bpm" && node._clockInterval) {
            clearInterval(node._clockInterval);
            const stepTime = 60000 / value;
            node._clockInterval = setInterval(() => {
              if (!this.ctx || this.ctx.state !== "running") return;
              const now = this.ctx.currentTime;
              const curBpm = node.params.bpm || 120;
              const curPW = node.params.pulseWidth || 0.5;
              const curStep = 60 / curBpm;
              const pw = curPW * curStep;
              node.clockGain.gain.setValueAtTime(1, now);
              node.clockGain.gain.setValueAtTime(0, now + pw);
              if (node._clockBeat % 2 === 0) {
                node.div2Gain.gain.setValueAtTime(1, now);
                node.div2Gain.gain.setValueAtTime(0, now + pw);
              }
              if (node._clockBeat % 4 === 0) {
                node.div4Gain.gain.setValueAtTime(1, now);
                node.div4Gain.gain.setValueAtTime(0, now + pw);
              }
              node._clockLed = !node._clockLed;
              if (node._onClockTick) node._onClockTick(node._clockBeat, node._clockLed);
              node._clockBeat++;
            }, stepTime);
          }
        }
        break;
      case "MULT":
        if (paramName === "gain" && node.input) node.input.gain.value = value;
        break;
    }
  }

  connect(fromId, fromPort, toId, toPort) {
    const fromNode = this.nodes[fromId];
    const toNode = this.nodes[toId];
    if (!fromNode || !toNode) return;

    // Determine source based on port name
    let src;
    if (fromNode.type === "STEREO") {
      src = fromPort === "R Out" ? fromNode.outputR : fromNode.leftOut;
    } else if (fromNode.type === "SEQ") {
      if (fromPort === "Trig") src = fromNode.outputTrig;
      else if (fromPort === "CV") src = fromNode.outputCV;
      else src = fromNode.output; // Gate
    } else if (fromNode.type === "CLOCK") {
      if (fromPort === "÷2") src = fromNode.outputDiv2;
      else if (fromPort === "÷4") src = fromNode.outputDiv4;
      else if (fromPort === "Reset") src = fromNode.outputReset;
      else src = fromNode.output; // Clock
    } else if (fromNode.type === "MULT") {
      if (fromPort === "A") src = fromNode.outA;
      else if (fromPort === "B") src = fromNode.outB;
      else if (fromPort === "C") src = fromNode.outC;
      else if (fromPort === "D") src = fromNode.outD;
      else src = fromNode.output;
    } else {
      src = fromNode.output;
    }
    if (!src) return;

    let dest;
    if (toNode.type === "VCF") {
      dest = toPort === "CV" ? toNode.filter.frequency : toNode.input;
    } else if (toNode.type === "VCA") {
      dest = toPort === "CV" ? toNode.gain.gain : toNode.input;
    } else if (toNode.type === "VCO") {
      if (toPort === "FM") dest = toNode.fmGain;
      else if (toPort === "V/Oct") dest = toNode.osc ? toNode.osc.frequency : null;
      else dest = toNode.osc ? toNode.osc.frequency : null;
    } else if (toNode.type === "MIXER") {
      const idx = parseInt(toPort.replace("In ", "")) - 1;
      dest = toNode.channels ? toNode.channels[idx] : null;
    } else if (toNode.type === "OUTPUT") {
      dest = toNode.input;
    } else if (toNode.type === "STEREO") {
      if (toPort === "L In") dest = toNode.leftIn;
      else if (toPort === "R In") dest = toNode.rightIn;
      else if (toPort === "Pan CV" && toNode.panner) dest = toNode.panner.pan;
      else dest = toNode.input; // Mono
    } else {
      dest = toNode.input;
    }

    if (src && dest) {
      try { src.connect(dest); } catch (e) { console.warn("Connection error:", e); }
      const connKey = `${fromId}:${fromPort}->${toId}:${toPort}`;
      fromNode.connections[connKey] = { src, dest, toId, toPort, fromPort };
    }
  }

  disconnect(fromId, toId, toPort, fromPort) {
    const fromNode = this.nodes[fromId];
    if (!fromNode) return;
    // Try both key formats for backward compat
    const connKey1 = `${fromId}:${fromPort}->${toId}:${toPort}`;
    const connKey2 = `${fromId}->${toId}:${toPort}`;
    const conn = fromNode.connections[connKey1] || fromNode.connections[connKey2];
    if (conn) {
      try { conn.src.disconnect(conn.dest); } catch (e) {
        // Fallback: try disconnecting from output
        try { if (fromNode.output) fromNode.output.disconnect(conn.dest); } catch (e2) {}
      }
      delete fromNode.connections[connKey1];
      delete fromNode.connections[connKey2];
    }
  }

  triggerADSR(moduleId) {
    const node = this.nodes[moduleId];
    if (!node || node.type !== "ADSR") return;
    const p = node.params || {};
    const now = this.ctx.currentTime;
    const g = node.envGain.gain;
    g.cancelScheduledValues(now);
    g.setValueAtTime(0, now);
    g.linearRampToValueAtTime(1, now + (p.attack || 0.01));
    g.linearRampToValueAtTime(p.sustain || 0.6, now + (p.attack || 0.01) + (p.decay || 0.3));
    // Release after sustain
    const releaseStart = now + (p.attack || 0.01) + (p.decay || 0.3) + 0.5;
    g.setValueAtTime(p.sustain || 0.6, releaseStart);
    g.linearRampToValueAtTime(0, releaseStart + (p.release || 0.5));
  }

  removeModuleNode(moduleId) {
    const node = this.nodes[moduleId];
    if (!node) return;
    // Disconnect all outgoing
    Object.values(node.connections || {}).forEach(c => {
      try { if (c.src) c.src.disconnect(c.dest); } catch (e) {
        try { if (node.output) node.output.disconnect(c.dest); } catch (e2) {}
      }
    });
    // Stop sources
    if (node.osc) try { node.osc.stop(); } catch (e) {}
    if (node.lfo) try { node.lfo.stop(); } catch (e) {}
    if (node.noiseSrc) try { node.noiseSrc.stop(); } catch (e) {}
    if (node.constSrc) try { node.constSrc.stop(); } catch (e) {}
    if (node.gateSrc) try { node.gateSrc.stop(); } catch (e) {}
    if (node.trigSrc) try { node.trigSrc.stop(); } catch (e) {}
    if (node.cvSrc) try { node.cvSrc.stop(); } catch (e) {}
    if (node.outGain) try { node.outGain.disconnect(); } catch (e) {}
    if (node._seqInterval) clearInterval(node._seqInterval);
    if (node._tunerInterval) clearInterval(node._tunerInterval);
    if (node._clockInterval) clearInterval(node._clockInterval);
    if (node.clockSrc) try { node.clockSrc.stop(); } catch (e) {}
    if (node.div2Src) try { node.div2Src.stop(); } catch (e) {}
    if (node.div4Src) try { node.div4Src.stop(); } catch (e) {}
    if (node.resetSrc) try { node.resetSrc.stop(); } catch (e) {}
    delete this.nodes[moduleId];
  }

  stop() {
    Object.keys(this.nodes).forEach(id => this.removeModuleNode(id));
    if (this.ctx) {
      this.ctx.close();
      this.ctx = null;
    }
    this.masterGain = null;
    this.analyser = null;
    this.isRunning = false;
  }

  getAnalyserData() {
    if (!this.analyser) return null;
    const data = new Uint8Array(this.analyser.frequencyBinCount);
    this.analyser.getByteTimeDomainData(data);
    return data;
  }

  dispose() {
    this.stop();
  }
}

// ─── KNOB COMPONENT ─────────────────────────────────────────────────────────
function Knob({ value, min, max, step, onChange, label, unit, size = 40, color, defaultValue }) {
  const dragRef = useRef(null);

  const pct = (value - min) / (max - min);
  const angle = -135 + pct * 270;

  useEffect(() => {
    if (!dragRef.current?.active) return;
  }, [value]);

  const onPointerDown = (e) => {
    e.preventDefault();
    e.stopPropagation();
    e.target.setPointerCapture(e.pointerId);
    dragRef.current = { startY: e.clientY, startVal: value, active: true };
  };

  const onPointerMove = (e) => {
    if (!dragRef.current?.active) return;
    e.preventDefault();
    const dy = dragRef.current.startY - e.clientY;
    const range = max - min;
    const newVal = Math.min(max, Math.max(min, dragRef.current.startVal + (dy / 200) * range));
    const decimals = step ? Math.max(0, -Math.floor(Math.log10(step))) : (range < 10 ? 3 : 1);
    onChange(parseFloat(newVal.toFixed(decimals)));
  };

  const onPointerUp = (e) => {
    if (dragRef.current) dragRef.current.active = false;
  };

  const onDoubleClick = (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (defaultValue !== undefined) onChange(defaultValue);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, userSelect: "none" }}>
      <div
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={onPointerUp}
        onDoubleClick={onDoubleClick}
        title="Drag to adjust • Double-click to reset"
        style={{
          width: size, height: size,
          borderRadius: "50%",
          background: `radial-gradient(circle at 35% 35%, #555, #1a1a1a)`,
          border: `2px solid ${color || "#666"}`,
          cursor: "ns-resize",
          position: "relative",
          boxShadow: `0 0 8px ${color || "#666"}33`,
          touchAction: "none",
        }}
      >
        <div style={{
          position: "absolute",
          width: 2, height: size / 2 - 4,
          background: color || "#fff",
          top: 4,
          left: "50%",
          transformOrigin: `50% ${size / 2 - 4}px`,
          transform: `translateX(-50%) rotate(${angle}deg)`,
          borderRadius: 1,
          boxShadow: `0 0 4px ${color || "#fff"}`,
          pointerEvents: "none",
        }} />
      </div>
      <span style={{ fontSize: 9, color: "#aaa", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1 }}>{label}</span>
      <span style={{ fontSize: 8, color: "#666", fontFamily: "'JetBrains Mono', monospace" }}>
        {typeof value === "number" ? (value >= 1000 ? `${(value / 1000).toFixed(1)}k` : value.toFixed(step && step < 0.1 ? 2 : (step && step < 1 ? 1 : 0))) : value}{unit && ` ${unit}`}
      </span>
    </div>
  );
}

// ─── MODULE COMPONENT ────────────────────────────────────────────────────────
function ModulePanel({ module, def, onParamChange, onRemove, onPortClick, onPortDoubleClick, onPortRightClick, activePort, connections, isOutput, engine }) {
  const portStyle = (type, idx, portName) => {
    const isActive = activePort && activePort.moduleId === module.id && activePort.port === portName && activePort.type === type;
    const isConnected = connections.some(c =>
      (type === "output" && c.fromId === module.id && c.fromPort === portName) ||
      (type === "input" && c.toId === module.id && c.toPort === portName)
    );
    return {
      width: 22, height: 22,
      borderRadius: "50%",
      background: isActive ? "#fff" : isConnected ? def.color || "#888" : "#333",
      border: `2px solid ${isActive ? "#fff" : def.color || "#888"}`,
      cursor: "pointer",
      boxShadow: isActive ? `0 0 10px #fff` : isConnected ? `0 0 6px ${def.color}88` : "none",
      transition: "all 0.15s",
    };
  };

  const portId = (type, portName) => `port-${module.id}-${type}-${portName.replace(/\s/g, "_")}`;

  return (
    <div style={{
      background: "#111",
      border: `1px solid ${def.color}44`,
      borderTop: `3px solid ${def.color}`,
      borderRadius: 6,
      padding: "14px 12px 10px 12px",
      minWidth: module.type === "SEQ" ? 240 : 160,
      position: "relative",
      boxShadow: `0 4px 20px #00000066, inset 0 1px 0 ${def.color}22`,
    }}>
      {!isOutput && (
        <button onClick={() => onRemove(module.id)} style={{
          position: "absolute", top: 4, right: 6,
          background: "none", border: "none", color: "#555", cursor: "pointer",
          fontSize: 14, lineHeight: 1, padding: 0,
        }}>×</button>
      )}
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
        <span style={{ fontSize: 16, color: def.color }}>{def.icon}</span>
        <span style={{
          fontSize: 10, fontWeight: 700, letterSpacing: 2,
          color: def.color,
          fontFamily: "'JetBrains Mono', monospace",
          textTransform: "uppercase",
        }}>{module.type.startsWith("CUSTOM_") ? module.type.replace("CUSTOM_", "").replace(/_/g, " ") : module.type}</span>
      </div>

      {/* Inputs */}
      {def.inputs && def.inputs.length > 0 && (
        <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
          {def.inputs.map((inp, i) => (
            <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
              <div
                id={portId("input", inp)}
                style={portStyle("input", i, inp)}
                onClick={() => onPortClick(module.id, "input", inp)}
                onDoubleClick={() => onPortDoubleClick && onPortDoubleClick(module.id, "input", inp)}
                onContextMenu={(e) => onPortRightClick && onPortRightClick(e, module.id, "input", inp)}
                data-port="true"
                title="Click: connect • Double-click: release cable • Right-click: add wire"
              />
              <span style={{ fontSize: 7, color: "#666", fontFamily: "'JetBrains Mono', monospace" }}>{inp}</span>
            </div>
          ))}
        </div>
      )}

      {/* Parameters */}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center", marginBottom: 8 }}>
        {def.params.map((p) => {
          if (p.options) {
            return (
              <div key={p.name} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                <select
                  value={module.params[p.name]}
                  onChange={(e) => onParamChange(module.id, p.name, e.target.value)}
                  style={{
                    background: "#222", color: def.color, border: `1px solid ${def.color}44`,
                    borderRadius: 3, fontSize: 9, padding: "2px 4px",
                    fontFamily: "'JetBrains Mono', monospace",
                    outline: "none", cursor: "pointer",
                  }}
                >
                  {p.options.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
                <span style={{ fontSize: 8, color: "#666", fontFamily: "'JetBrains Mono', monospace" }}>{p.label}</span>
              </div>
            );
          }
          return (
            <Knob
              key={p.name}
              value={module.params[p.name]}
              min={p.min}
              max={p.max}
              step={p.step}
              onChange={(v) => onParamChange(module.id, p.name, v)}
              label={p.label}
              unit={p.unit}
              color={def.color}
              defaultValue={p.default}
            />
          );
        })}
      </div>

      {/* Outputs */}
      {def.outputs && def.outputs.length > 0 && (
        <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
          {def.outputs.map((out, i) => (
            <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
              <div
                id={portId("output", out)}
                style={portStyle("output", i, out)}
                onClick={() => onPortClick(module.id, "output", out)}
                onDoubleClick={() => onPortDoubleClick && onPortDoubleClick(module.id, "output", out)}
                onContextMenu={(e) => onPortRightClick && onPortRightClick(e, module.id, "output", out)}
                data-port="true"
                title="Click: connect • Double-click: release cable • Right-click: add wire"
              />
              <span style={{ fontSize: 7, color: "#666", fontFamily: "'JetBrains Mono', monospace" }}>{out}</span>
            </div>
          ))}
        </div>
      )}

      {/* ADSR trigger button */}
      {module.type === "ADSR" && (
        <button
          onMouseDown={() => {
            if (window.__audioEngine) window.__audioEngine.triggerADSR(module.id);
          }}
          style={{
            marginTop: 6, width: "100%", padding: "4px 0",
            background: def.color + "33", border: `1px solid ${def.color}66`,
            color: def.color, borderRadius: 3, cursor: "pointer",
            fontSize: 9, fontFamily: "'JetBrains Mono', monospace",
            letterSpacing: 1,
          }}
        >▶ TRIGGER</button>
      )}

      {/* Sequencer step grid */}
      {module.type === "SEQ" && (
        <SequencerGrid module={module} onParamChange={onParamChange} />
      )}

      {/* Tuner display */}
      {module.type === "TUNER" && (
        <TunerDisplay module={module} engine={engine} />
      )}

      {/* Clock display */}
      {module.type === "CLOCK" && (
        <ClockDisplay module={module} engine={engine} />
      )}

      {/* Custom module subcircuit badges */}
      {module.type.startsWith("CUSTOM_") && def?._blockNames && (
        <div style={{
          marginTop: 6, paddingTop: 4, borderTop: `1px solid ${def.color}22`,
          display: "flex", gap: 3, flexWrap: "wrap",
        }}>
          {def._blockNames.map((n, i) => (
            <span key={i} style={{
              fontSize: 6, color: def.color, background: def.color + "15",
              padding: "1px 4px", borderRadius: 2, letterSpacing: 0.5,
            }}>{n}</span>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── SEQUENCER GRID ──────────────────────────────────────────────────────────
const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

function SequencerGrid({ module, onParamChange }) {
  const numSteps = module.params.steps || 8;
  const [stepData, setStepData] = useState(() => module.params.stepData || [1,1,1,1,1,1,1,1]);
  const [pitchData, setPitchData] = useState(() => module.params.pitchData || [0,0,0,0,0,0,0,0]);
  const [currentStep, setCurrentStep] = useState(-1);
  const color = "#ff5722";

  // Register step callback with audio engine
  useEffect(() => {
    const checkEngine = () => {
      const engine = window.__audioEngine;
      if (engine && engine.nodes[module.id]) {
        engine.nodes[module.id]._onStep = (step) => setCurrentStep(step);
      }
    };
    checkEngine();
    const interval = setInterval(checkEngine, 500);
    return () => clearInterval(interval);
  }, [module.id]);

  // Sync step/pitch data to audio engine
  useEffect(() => {
    const engine = window.__audioEngine;
    if (engine && engine.nodes[module.id]) {
      engine.nodes[module.id].stepData = stepData;
      engine.nodes[module.id].pitchData = pitchData;
    }
  }, [stepData, pitchData, module.id]);

  const toggleStep = (i) => {
    setStepData(prev => {
      const next = [...prev];
      next[i] = next[i] ? 0 : 1;
      return next;
    });
  };

  const changePitch = (i, delta) => {
    setPitchData(prev => {
      const next = [...prev];
      next[i] = Math.max(-12, Math.min(12, (next[i] || 0) + delta));
      return next;
    });
  };

  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ fontSize: 8, color: "#666", letterSpacing: 1, marginBottom: 4, fontFamily: "'JetBrains Mono', monospace" }}>
        STEP SEQUENCE
      </div>
      {/* Step buttons row */}
      <div style={{ display: "flex", gap: 3, marginBottom: 4 }}>
        {Array.from({ length: numSteps }).map((_, i) => (
          <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, flex: 1 }}>
            {/* Current step indicator */}
            <div style={{
              width: 4, height: 4, borderRadius: "50%",
              background: currentStep === i ? color : "transparent",
              boxShadow: currentStep === i ? `0 0 6px ${color}` : "none",
              transition: "all 0.05s",
            }} />
            {/* Step on/off button */}
            <div
              onClick={() => toggleStep(i)}
              style={{
                width: 22, height: 22,
                borderRadius: 3,
                background: stepData[i] ? (currentStep === i ? color : color + "88") : (currentStep === i ? "#333" : "#1a1a1a"),
                border: `1px solid ${stepData[i] ? color : "#333"}`,
                cursor: "pointer",
                transition: "all 0.08s",
                boxShadow: currentStep === i ? `0 0 8px ${color}44` : "none",
              }}
            />
            {/* Pitch control */}
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
              <div
                onClick={() => changePitch(i, 1)}
                style={{ cursor: "pointer", fontSize: 8, color: "#555", lineHeight: 1, userSelect: "none" }}
              >▲</div>
              <span style={{
                fontSize: 7, color: pitchData[i] ? color : "#555",
                fontFamily: "'JetBrains Mono', monospace",
                minWidth: 16, textAlign: "center",
              }}>
                {NOTE_NAMES[((pitchData[i] || 0) + 120) % 12]}
              </span>
              <div
                onClick={() => changePitch(i, -1)}
                style={{ cursor: "pointer", fontSize: 8, color: "#555", lineHeight: 1, userSelect: "none" }}
              >▼</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{ fontSize: 7, color: "#444", fontFamily: "'JetBrains Mono', monospace", textAlign: "center" }}>
        click steps to toggle • arrows set pitch
      </div>
    </div>
  );
}

// ─── TUNER DISPLAY ──────────────────────────────────────────────────────────
function TunerDisplay({ module, engine }) {
  const [note, setNote] = useState("—");
  const [freq, setFreq] = useState(0);
  const [cents, setCents] = useState(0);

  useEffect(() => {
    if (!engine) return;
    const node = engine.nodes[module.id];
    if (!node) return;
    node._onTunerUpdate = (n, f, c) => { setNote(n); setFreq(f); setCents(c); };
    return () => { if (node) node._onTunerUpdate = null; };
  }, [engine, module.id]);

  const absCents = Math.abs(cents);
  const inTune = absCents < 5;
  const tuneColor = freq > 0 ? (inTune ? "#2ecc71" : absCents < 15 ? "#f39c12" : "#e74c3c") : "#333";
  const hasSignal = freq > 0;

  return (
    <div style={{
      background: "#0a0a0a", borderRadius: 4, padding: "8px 10px", marginTop: 6,
      textAlign: "center", border: `1px solid ${tuneColor}44`,
      transition: "border-color 0.15s",
    }}>
      {/* Note name — large */}
      <div style={{ fontSize: 24, fontWeight: 700, color: hasSignal ? tuneColor : "#333", letterSpacing: 2, lineHeight: 1.1 }}>
        {hasSignal ? note : "—"}
      </div>
      {/* Frequency */}
      <div style={{ fontSize: 9, color: hasSignal ? "#888" : "#333", marginTop: 3 }}>
        {hasSignal ? `${freq.toFixed(1)} Hz` : "patch a signal to In"}
      </div>
      {/* Cents bar */}
      <div style={{
        margin: "5px auto 2px", width: "90%", height: 8, background: "#111",
        borderRadius: 4, position: "relative", overflow: "hidden",
      }}>
        {/* Center mark */}
        <div style={{
          position: "absolute", left: "50%", top: 0, bottom: 0,
          width: 2, background: "#333", transform: "translateX(-1px)",
        }} />
        {/* Indicator */}
        {hasSignal && (
          <div style={{
            position: "absolute", top: 1, bottom: 1,
            left: `${Math.max(5, Math.min(95, 50 + cents))}%`, width: 6, borderRadius: 3,
            background: tuneColor, transform: "translateX(-3px)",
            transition: "left 0.08s",
            boxShadow: `0 0 4px ${tuneColor}`,
          }} />
        )}
      </div>
      {/* Cents readout */}
      <div style={{ fontSize: 8, color: hasSignal ? tuneColor : "#333", marginTop: 2 }}>
        {hasSignal ? (inTune ? "✓ in tune" : cents > 0 ? `+${cents}¢ sharp` : `${cents}¢ flat`) : ""}
      </div>
    </div>
  );
}

// ─── WAVEFORM DISPLAY ────────────────────────────────────────────────────────
function Waveform({ engine }) {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);

  useEffect(() => {
    const draw = () => {
      const canvas = canvasRef.current;
      if (!canvas || !engine) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.fillStyle = "#0a0a0a";
      ctx.fillRect(0, 0, w, h);

      // Grid
      ctx.strokeStyle = "#1a1a1a";
      ctx.lineWidth = 0.5;
      for (let y = 0; y < h; y += h / 4) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      }
      ctx.strokeStyle = "#222";
      ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke();

      const data = engine.getAnalyserData();
      if (data) {
        ctx.strokeStyle = "#00ff88";
        ctx.lineWidth = 1.5;
        ctx.shadowColor = "#00ff88";
        ctx.shadowBlur = 4;
        ctx.beginPath();
        const sliceWidth = w / data.length;
        for (let i = 0; i < data.length; i++) {
          const v = data[i] / 128.0;
          const y = (v * h) / 2;
          if (i === 0) ctx.moveTo(0, y);
          else ctx.lineTo(i * sliceWidth, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      rafRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [engine]);

  return (
    <canvas
      ref={canvasRef}
      width={600}
      height={100}
      style={{ width: "100%", height: 80, borderRadius: 4, border: "1px solid #1a1a1a" }}
    />
  );
}
